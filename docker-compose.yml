services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: runbook-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-runbook_agent}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-runbook_agent}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: runbook-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend-java:
    build:
      context: ./backend-java
    container_name: runbook-java
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-runbook_agent}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      JWT_SECRET: ${JWT_SECRET:-replace-me}
      PYTHON_SERVICE_URL: ${PYTHON_SERVICE_URL:-http://backend-python:8000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/auth/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 30s

  backend-python:
    build:
      context: .
      dockerfile: backend-python/Dockerfile
    container_name: runbook-python
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-placeholder}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-lsv2-placeholder}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-runbook-agent}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-runbook_agent}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      FASTAPI_HOST: ${FASTAPI_HOST:-0.0.0.0}
      FASTAPI_PORT: ${FASTAPI_PORT:-8000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()\" || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 20s

  # frontend:
  #   Frontend runs locally via `cd frontend && npm run dev` until a Dockerfile is added.
  #   Uncomment and supply frontend/Dockerfile when containerizing the UI.
  #   build:
  #     context: ./frontend
  #   container_name: runbook-frontend
  #   depends_on:
  #     - backend-java
  #     - backend-python
  #   ports:
  #     - "3000:3000"

volumes:
  postgres_data:
