version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: runbook-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-runbook_agent}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: runbook-redis
    ports:
      - "6379:6379"

  backend-java:
    build:
      context: ./backend-java
    container_name: runbook-java
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-runbook_agent}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      JWT_SECRET: ${JWT_SECRET:-replace-me}
    depends_on:
      - postgres
      - redis
    ports:
      - "8080:8080"

  backend-python:
    build:
      context: ./backend-python
    container_name: runbook-python
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-placeholder}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-true}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-lsv2-placeholder}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-runbook-agent}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-runbook_agent}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      FASTAPI_HOST: ${FASTAPI_HOST:-0.0.0.0}
      FASTAPI_PORT: ${FASTAPI_PORT:-8000}
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: runbook-frontend
    depends_on:
      - backend-java
      - backend-python
    ports:
      - "3000:3000"

volumes:
  postgres_data:
