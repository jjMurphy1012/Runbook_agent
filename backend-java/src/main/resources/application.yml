spring:
  application:
    name: runbook-agent-java
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:runbook_agent}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8080

app:
  jwt-secret: ${JWT_SECRET:replace-me}
  python-service-url: ${PYTHON_SERVICE_URL:http://localhost:8000}
  cors-origins: ${APP_CORS_ORIGINS:http://localhost:3000}
